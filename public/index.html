<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitality - Inicio de sesión</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

  <main class="login-app-screen">
    <section class="login-app-card">
      <div class="login-logo-box">
        <img src="logo.jpg" alt="Logo Vitality" class="login-logo">
      </div>

      <div class="login-text">
        <h1>Vitality</h1>
        <p>Organiza tu día, registra tu bienestar y recibe apoyo personalizado.</p>
      </div>

      <form id="loginForm" class="login-app-form">
        <div class="input-app-group">
          <label for="correoLogin">Correo electrónico</label>
          <input
            type="email"
            id="correoLogin"
            placeholder="tu@email.com"
            required
          >
        </div>

        <div class="input-app-group">
          <label for="passwordLogin">Contraseña</label>
          <input
            type="password"
            id="passwordLogin"
            placeholder="Ingresa tu contraseña"
            required
          >
        </div>

        <button type="submit" class="login-primary-btn">
          Iniciar sesión
        </button>
      </form>

      <div class="login-secondary-actions">
        <p>¿No tienes cuenta?</p>
        <a href="registro.html">Crear cuenta</a>
      </div>

      <button
        type="button"
        class="login-theme-btn"
        onclick="toggleTheme()"
      >
        🌙 / ☀️ Cambiar tema
      </button>
    </section>
  </main>


  <!-- hay que sacar estos 2 scrips -->
  <script src="nav.js"></script>
  <script src="script.js"></script>

  <script type="module">
    import { iniciarSesionVitality } from './js/services/auth.js';

    // Vinculamos el evento submit al formulario de la vista
    const form = document.getElementById("loginForm");
    if (form) {
      form.addEventListener("submit", iniciarSesionVitality);
    }
  </script>

</body>
</html>
