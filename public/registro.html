<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitality - Registro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

  <main class="login-app-screen">
    <section class="login-app-card">
      <div class="login-logo-box">
        <img src="logo.jpg" alt="Logo Vitality" class="login-logo">
      </div>

      <div class="login-text">
        <h1>Crear cuenta</h1>
        <p>Regístrate para comenzar a organizar tu bienestar diario con Vitality.</p>
      </div>

      <form id="registroForm" class="login-app-form">
        <div class="input-app-group">
          <label for="nombre">Nombre completo</label>
          <input
            type="text"
            id="nombre"
            placeholder="Tu nombre"
            required
          >
        </div>

        <div class="input-app-group">
          <label for="correo">Correo electrónico</label>
          <input
            type="email"
            id="correo"
            placeholder="tu@email.com"
            required
          >
        </div>

        <div class="input-app-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Crea una contraseña"
            required
          >
        </div>

        <button type="submit" class="login-primary-btn">
          Crear cuenta
        </button>
      </form>

      <div class="login-secondary-actions">
        <p>¿Ya tienes cuenta?</p>
        <a href="index.html">Iniciar sesión</a>
      </div>

      <button
        type="button"
        class="login-theme-btn"
        onclick="toggleTheme()"
      >
        🌙 / ☀️ Cambiar tema
      </button>
    </section>
  </main>

  <script src="nav.js"></script>
  <script src="script.js"></script>
</body>
</html>
