<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitality - Registro</title>
  <link rel="stylesheet" href="styles.css">
</head>


<body class="login-page">

  <main class="login-app-screen">
    <section class="login-app-card registro-app-card">
      <div class="login-logo-box">
        <img src="logo.jpg" alt="Logo Vitality" class="login-logo">
      </div>

      <div class="login-text">
        <h1>Crear cuenta</h1>
        <p>Personaliza Vitality según tu edad, ocupación y actividades favoritas.</p>
      </div>

      <form id="registroForm" class="login-app-form">
        <div class="input-app-group">
          <label for="nombre">Nombre completo</label>
          <input
            type="text"
            id="nombre"
            placeholder="Ej: Constanza Alegría"
            required
          >
        </div>

        <div class="input-app-group">
          <label for="correo">Correo electrónico</label>
          <input
            type="email"
            id="correo"
            placeholder="tu@email.com"
            required
          >
        </div>

        <div class="input-app-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Crea una contraseña"
            required
          >
        </div>

        <div class="input-app-group">
          <label for="edad">Edad</label>
          <input
            type="number"
            id="edad"
            min="1"
            max="120"
            placeholder="Ej: 22"
            required
          >
        </div>

        <div class="input-app-group">
          <label for="ocupacion">Ocupación</label>
          <select id="ocupacion" required>
            <option value="">Selecciona una opción</option>
            <option value="Trabajador">Trabajador</option>
            <option value="Estudiante universitario">Estudiante universitario</option>
            <option value="Estudiante escolar">Estudiante escolar</option>
          </select>
        </div>

        <div class="input-app-group">
          <label for="actividadesFavoritas">Actividades favoritas</label>
          <textarea
            id="actividadesFavoritas"
            placeholder="Ej: caminar, escuchar música, estudiar, nadar"
            required
          ></textarea>
        </div>

        <button type="submit" class="login-primary-btn">
          Crear cuenta
        </button>
      </form>

      <div class="login-secondary-actions">
        <p>¿Ya tienes cuenta?</p>
        <a href="index.html">Iniciar sesión</a>
      </div>

      <button
        type="button"
        class="login-theme-btn"
        onclick="toggleTheme()"
      >
        🌙 / ☀️ Cambiar tema
      </button>
    </section>
  </main>

    <!-- hay que sacar estos 2 scrips -->
  <script src="nav.js"></script>
  <script src="script.js"></script>

  <script type="module">
    import './js/ui.js';
    import { registrarUsuarioVitality } from './js/services/auth.js';

    const form = document.getElementById("registroForm");
    if (form) {
    form.addEventListener("submit", registrarUsuarioVitality);
    } 
</script>

</body>
</html>
